<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Cards</title>

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>
<body>



    <nav class="navbar">

        <div class="logo">
            <img src="v.jpeg" alt="Logo">
        </div>

        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">Service</a></li>
            <li><a href="#">Contact</a></li>
            <li><a href="#">About us</a></li>
        </ul>

        <button class="login-btn">Login</button>

    </nav>


    <section class="products">

        <!-- Card 1 -->
        <div class="card">
            <img src="1.jpg" alt="">

            <div class="content">
                <div class="top">
                    <h3>One-Shoulder Black Gown</h3>
                    <span>₹32645</span>
                </div>

                <div class="rating">
                    ★★★★☆
                    <span>(50 Reviews)</span>
                </div>

                <button>
                    <i class="fa-solid fa-bag-shopping"></i>
                    ADD TO CART
                </button>
            </div>
        </div>

        <!-- Card 2 -->
        <div class="card">
            <img src="2.jpg" alt="">

            <div class="content">
                <div class="top">
                    <h3>Dusty Pink Formal Dresses</h3>
                    <span>₹2999</span>
                </div>

                <div class="rating">
                    ★★★★☆
                    <span>(101 Reviews)</span>
                </div>

                <button>
                    <i class="fa-solid fa-bag-shopping"></i>
                    ADD TO CART
                </button>
            </div>
        </div>

        <!-- Card 3 -->
        <div class="card">
            <img src="3.jpg" alt="">

            <div class="content">
                <div class="top">
                    <h3>Elegant Sage Green Evening Gown with High Slit</h3>
                    <span>₹8999</span>
                </div>

                <div class="rating">
                    ★★★★☆
                    <span>(189 Reviews)</span>
                </div>

                <button>
                    <i class="fa-solid fa-bag-shopping"></i>
                    ADD TO CART
                </button>
            </div>
        </div>

    </section>

   

</body>
</html>
